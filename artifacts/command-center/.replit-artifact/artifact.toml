kind = "web"
previewPath = "/"
title = "Regulatory Communications Command Center"
version = "1.0.0"
id = "artifacts/command-center"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23748

[services.development]
run = "pnpm --filter @workspace/command-center run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/command-center", "run", "build" ]
publicDir = "artifacts/command-center/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23748"
BASE_PATH = "/"
